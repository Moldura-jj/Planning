<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moldura Planning — Projecten</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="styles.css?v=projects-list-2" />
  <style>
    .projects-row{ cursor:pointer; }
    .projects-row:hover td{ background:#f8fafc; }
    .projects-sort{
      border:0;
      background:transparent;
      color:inherit;
      font:inherit;
      padding:0;
      cursor:pointer;
    }
    .projects-sort::after{
      content:"";
      display:inline-block;
      width:1.1em;
      color:var(--muted);
    }
    .projects-sort.is-active.asc::after{ content:" ▲"; }
    .projects-sort.is-active.desc::after{ content:" ▼"; }
  </style>
</head>
<body class="page-project">
  <div class="container">
    <div class="topbar">
      <div class="topbar-left">
        <a class="app-logo" href="index.html" aria-label="Moldura">
          <img class="app-logo-img" src="Logo.png" alt="Moldura" />
        </a>
        <a class="btn ghost" href="index.html">← Menu</a>
        <div class="brand"><span class="dot"></span> Projecten</div>
      </div>
        <div class="row">
          <input id="q" class="input" style="width:420px; max-width:60vw" placeholder="Zoek op projectnr / klant / projectnaam..." />
          <button id="btnAddProject" class="btn primary" type="button">+ Project</button>
          <button id="btnReload" class="btn" type="button">Ververs</button>
          <button id="btnLogout" class="btn" type="button">Uitloggen</button>
        </div>
      </div>

    <div class="card">
      <div class="hd">
        <h2>Lijst</h2>
        <span id="meta" class="muted"></span>
      </div>
      <div class="bd">
        <div id="status"></div>
        <table class="table" id="tbl">
          <thead>
            <tr>
              <th style="width:160px"><button class="projects-sort" type="button" data-sort="projectNo">Projectnr</button></th>
              <th style="width:320px"><button class="projects-sort" type="button" data-sort="customer">Klant</button></th>
              <th>Project</th>
              <th style="width:160px"><button class="projects-sort" type="button" data-sort="deliverydate">Leverdatum</button></th>
              <th style="width:140px"><button class="projects-sort" type="button" data-sort="status">Status</button></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

<div id="projectModalBackdrop" class="modal-backdrop" hidden></div>

<div id="projectModal" class="modal" hidden>
  <div class="modal-head">
    <div>
      <h2>Project toevoegen</h2>
      <div class="muted">Nieuw project handmatig aanmaken</div>
    </div>
    <button id="btnProjectModalClose" class="btn small" type="button">✕</button>
  </div>

  <div class="modal-body">
    <label class="field">
      <span>Projectnummer</span>
      <input id="pmProjectNr" class="input" type="text" placeholder="Bijv. 2600104" />
    </label>

    <label class="field">
      <span>Klant</span>
      <input id="pmKlant" class="input" type="text" placeholder="Klantnaam" />
    </label>

    <label class="field">
      <span>Projectnaam</span>
      <input id="pmProjectNaam" class="input" type="text" placeholder="Projectomschrijving" />
    </label>

    <label class="field">
      <span>Status</span>
      <input id="pmStatus" class="input" type="number" value="2" />
    </label>
  </div>

  <div class="modal-foot">
    <button id="btnProjectCancel" class="btn" type="button">Annuleren</button>
    <button id="btnProjectSave" class="btn primary" type="button">Opslaan</button>
  </div>
</div>

  <script type="module" src="projects.js"></script>
</body>
</html>
