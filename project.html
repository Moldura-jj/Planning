<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moldura Planning — Project</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="styles.css?v=project-layout-3" />
  <style>
    .page-project{ overflow-x:auto; }
    .page-project .container{
      width:min(1880px, calc(100vw - 24px));
      min-width:1720px;
      max-width:none;
      margin:0 auto;
      padding:0;
    }
    .project-detail-grid{
      display:grid !important;
      grid-template-columns:420px 420px minmax(760px, 1fr);
      gap:28px;
      align-items:start;
    }
    .project-topbar-nav{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }
    .project-detail-col,
    .project-side-col{
      display:grid;
      gap:14px;
      align-content:start;
      min-width:0;
    }
    .project-sections-panel{ min-width:0; }
    .project-sections-panel{
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
      overflow:hidden;
    }
    .project-sections-panel .project-sections-head{
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      align-items:flex-start !important;
    }
    .project-sections-panel .project-sections-body{
      padding:12px 14px;
    }
  </style>
</head>
<body class="page-project">
  <div class="container">
    <div class="topbar">
      <div class="project-topbar-nav">
        <a class="app-logo" href="index.html" aria-label="Moldura">
          <img class="app-logo-img" src="Logo.png" alt="Moldura" />
        </a>
        <a class="btn ghost nav-projects" href="projects.html">Projecten</a>
        <a class="btn ghost nav-projects" href="planning.html">Planning</a>
        <div class="brand"><span class="dot"></span> <span id="title">Project</span></div>
      </div>
      <div class="row">
        <button id="btnLogout" class="btn">Uitloggen</button>
      </div>
    </div>

    <div id="status" style="margin-top:14px"></div>

    <div class="card" id="cardMain" style="display:none">
      <div class="hd">
        <div class="row" style="gap:10px; flex-wrap:wrap">
          <span class="chip blue" id="chipHead"></span>
        </div>
        <div class="row" style="gap:10px; flex-wrap:wrap">
          <button class="btn ghost nav-projects" id="btnSaveProject" type="button">Opslaan</button>
          <span class="pill" id="pillStatus"></span>
          <span class="muted" id="pillMeta"></span>
        </div>
      </div>

      <div class="bd">
        <div class="project-detail-grid">
          <div class="project-detail-col">
            <div class="card" style="box-shadow:none">
              <div class="hd"><h2>Project</h2></div>
              <div class="bd"><div id="blkProject" class="fieldgrid"></div></div>
            </div>

            <div class="card" style="box-shadow:none">
              <div class="hd"><h2>Klant</h2></div>
              <div class="bd"><div id="blkCustomer" class="fieldgrid"></div></div>
            </div>

            <div class="card" style="box-shadow:none">
              <div class="hd"><h2>Aflevergegevens</h2></div>
              <div class="bd"><div id="blkDelivery" class="fieldgrid"></div></div>
            </div>
          </div>

          <div class="project-detail-col">
            <div class="card" style="box-shadow:none">
              <div class="hd"><h2>Order</h2></div>
              <div class="bd"><div id="blkOrder" class="fieldgrid"></div></div>
            </div>

            <div class="card" style="box-shadow:none">
              <div class="hd"><h2>Totalen</h2></div>
              <div class="bd">
                <div id="blkTotals" class="fieldgrid"></div>
                <div class="muted" style="margin-top:10px; font-size:13px">
                </div>
              </div>
            </div>
          </div>

          <div class="project-side-col">
            <div class="project-sections-panel">
              <div class="project-sections-head row" style="justify-content:space-between; align-items:flex-end; gap:12px">
                <div>
                  <h2 style="margin:0 0 6px">Secties</h2>
                  <div class="muted" id="secMeta"></div>
                </div>
                <button class="btn ghost nav-projects" id="btnAddSection" type="button">+ Sectie</button>
              </div>

              <div class="project-sections-body">
                <table class="table" id="secTable">
                  <thead>
                    <tr id="secHead"></tr>
                  </thead>
                  <tbody id="secBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <div class="hr"></div>

        <div class="project-planning-panel">
          <div class="row" style="justify-content:space-between; align-items:flex-end; gap:12px">
            <div>
              <h2 style="margin:0 0 6px">Planning</h2>
              <div class="muted" id="projectPlanningMeta">Planning laden...</div>
            </div>
          </div>
          <div class="project-planning-scroll" id="projectPlanning"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="project.js"></script>
  <script type="module" src="project-planning.js"></script>
</body>
</html>
